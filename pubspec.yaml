name: grade_calculator
description: A Flutter app for converting scores to grades using Excel files.

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  excel: ^4.0.3
  file_picker: ^10.3.10
  path_provider: ^2.1.1
  permission_handler: ^12.0.1
  share_plus: ^12.0.1
  fl_chart: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/